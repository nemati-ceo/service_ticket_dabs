# Databricks asset bundle definition for the ServiceTicket pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: analyticsg.ServiceTicket

include:
  - src/main/databricks/jobs/*.yml

variables:
  DEFAULT_CLUSTER_POLICY_NAME:
    description: The name of the cluster policy to use for the clusters.
    default: udp_job
  DEFAULT_CLUSTER_POLICY_ID:
    lookup:
      cluster_policy: ${var.DEFAULT_CLUSTER_POLICY_NAME}

  VERSION:
    description: Package version associated with the bundle
    default: "0.1.0-SNAPSHOT"
  GROUP_ID:
    description: the NM group ID associated with the bundle
    default: analyticsg
  ARTIFACT_ID:
    description: the NM artifact ID (must match git repo name)
    default: ServiceTicket
  RESOURCE_PREFIX:
    description: The prefix to use for all resources created by the bundle
    default: ${var.GROUP_ID}.${var.ARTIFACT_ID}
  ROOT_PATH:
    description: The path to deploy the bundle
    default: /Bundles/${var.GROUP_ID}/${var.ARTIFACT_ID}

  # --- SERVICE PRINCIPAL: disabled until provisioned. Re-enable for prod. ---
  # SERVICE_PRINCIPAL_NAME:
  #   default: ${var.GROUP_ID}.${var.ARTIFACT_ID}.${bundle.target}
  # SERVICE_PRINCIPAL_ID:
  #   lookup:
  #     service_principal: ${var.SERVICE_PRINCIPAL_NAME}

workspace:
  root_path: ${var.ROOT_PATH}

targets:
  redzone:
    workspace:
      host: https://nml-udpr-redzone.cloud.databricks.com
    presets:
      tags:
        utan: "84682"
        groupId: ${var.GROUP_ID}
        artifactId: ${var.ARTIFACT_ID}
    # Running as yourself for dev/testing (no SP yet).
    run_as:
      user_name: "alinemati@northwesternmutual.com"
    permissions:
      - level: CAN_MANAGE
        user_name: "alinemati@northwesternmutual.com"

resources:
  clusters:
    all_purpose_cluster:
      cluster_name: all purpose cluster
      spark_version: 17.3.x-scala2.13
      policy_id: ${var.DEFAULT_CLUSTER_POLICY_ID}
      node_type_id: "i4i.xlarge"
      autotermination_minutes: 60
      data_security_mode: "USER_ISOLATION"
      aws_attributes:
        first_on_demand: 1
      autoscale:
        min_workers: 1
        max_workers: 10
      custom_tags:
        utan: "84682"
        groupId: "analyticsg"
        artifactId: "ServiceTicket"
      # --- Artifactory / service-credential secrets: enable when scope known ---
      # spark_env_vars:
      #   ARTIFACTORY_USER: "{{secrets/artifactory/user}}"
      #   ARTIFACTORY_API_KEY: "{{secrets/artifactory/api_key}}"
      #   DATABRICKS_DEFAULT_SERVICE_CREDENTIAL_NAME: "{{secrets/<SCOPE>/credential_name}}"
