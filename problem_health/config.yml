tables:
  input: "redzone_consume.model_governance.ph01_incidents_to_open_problems"
  output_incident: "redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity"
  output_problem: "redzone_consume.model_governance.ph01_output_ProblemHealth"

model:
  name: "all-MiniLM-L6-v2"
  registry_name: "redzone_consume.model_governance.all_MiniLM_L6_v2"
  backend: "onnx"
  batch_size: 256
  volume_path: "/Volumes/redzone_consume/model_governance/ProblemHealth/model"

volume:
  base_path: "/Volumes/redzone_consume/model_governance/ProblemHealth"
  save_embeddings: true
  save_incident_scores: true
  save_problem_health: true

script:
  workspace_dir: "/Workspace/Users/nancyhuang@northwesternmutual.com/TCS/script"

cleaning:
  engine: "spark"

incremental:
  key_column: "number"
  update_column: "sys_updated_on"
  hash_columns:
    - "short_description"
    - "description"
    - "problem_id.short_description"
    - "problem_id.description"

run:
  limit: null


summarization:
  model: "databricks-claude-opus-4-6"
  input_table: "redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity"

  output_incident: "redzone_consume.model_governance.ph02_output_IncidentSummaries"
  output_problem: "redzone_consume.model_governance.ph02_output_ProblemSummaries"

  volume_base_path: "/Volumes/redzone_consume/model_governance/LLMSummarization"
  save_to_volume: true

  fail_on_error: false
  drop_deleted: true

  eval:
    enabled: false
    sample_size: 5000
    top_k: 10
    embedding_model: "all-MiniLM-L6-v2"


reranking:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_length: 512
  top_k: 50
  chunk_size: 5000
  batch_size: 128
  limit: 5000

  input_sql: >
    SELECT CAST(i.number AS STRING)     AS number,
           s.incident_summary           AS incident_summary,
           CAST(i.problem_id AS STRING) AS problem_id
    FROM redzone_consume.model_governance.ph02_output_IncidentSummaries s
    JOIN redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity i
      ON CAST(i.number AS STRING) = s.number
    WHERE i.problem_id IS NOT NULL
  input_table: null
  input_parquet: null
  incident_text_col: "incident_summary"

  problem_table: "redzone_consume.model_governance.ph02_output_ProblemSummaries"
  problem_parquet: null
  problem_text_col: "problem_summary"
  problem_id_col: "problem_id"

  similarity_matrix_path: null
  incident_embeddings_path: null
  problem_embeddings_path: null
  reuse_existing: true
  model_volume_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank/cross_encoder_model"
  bi_encoder_volume_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank/bi_encoder_model"
  bi_encoder_model: "all-MiniLM-L6-v2"
  bi_encoder_batch_size: 64
  candidate_chunk_size: 1000

  number_col: "number"
  output_table: "redzone_consume.model_governance.ph03_output_RerankedScores"
  volume_base_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank"
  save_to_volume: true

  eval:
    enabled: true
    k_values: [5, 10]
    baselines:
      PH02: {1: 0.4034, 5: 0.7072, 7: 0.7593, 10: 0.8044}
      PH05: {1: 0.3885, 5: 0.6955, 7: 0.7456, 10: 0.8062}


gbm_inference:
  model_path: "/Volumes/redzone_consume/model_governance/GradientBoostInference/PH04_gradient_boosting_model.pkl"
  reuse_existing: true

  top_n: 10
  batch_size: 500000

  # stage-03 reranked scores (the producer): number, candidate_problem_id, cosine_sim, rerank_score
  reranked_sql: null
  reranked_table: "redzone_consume.model_governance.ph03_output_RerankedScores"
  reranked_parquet: null
  candidate_id_col: "candidate_problem_id"
  cosine_col: "cosine_sim"
  reranker_col: "rerank_score"

  # incidents: number + gold problem_id (+ business_service). SET to your source.
  incident_sql: null
  incident_table: "redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity"
  incident_parquet: null

  # problem catalog: problem_id (+ business_service + description). SET to your source.
  problem_table: "redzone_consume.model_governance.ph02_output_ProblemSummaries"
  problem_parquet: null

  number_col: "number"
  problem_id_col: "problem_id"
  incident_bs_col: "business_service"
  problem_bs_col: "business_service"
  problem_desc_col: "problem_summary"

  output_table: "redzone_consume.model_governance.ph04_output_Incident_Problem_Linking_Top10"
  volume_base_path: "/Volumes/redzone_consume/model_governance/GradientBoostInference"
  save_to_volume: true

  eval:
    enabled: true
    k_values: [1, 5, 7, 10]


clustering:
  reuse_existing: true
  embed_model: "all-MiniLM-L6-v2"
  embed_volume_path: "/Volumes/redzone_consume/model_governance/Clustering/embed_model"
  embed_batch_size: 64

  input_sql: null
  input_table: "redzone_consume.model_governance.ph05_input_cluster"
  input_parquet: null
  number_col: "number"
  text_col: "summary_final"
  cat_cols: ["business_service", "u_service_feature", "u_incident_type"]

  umap_params:
    n_neighbors: 15
    n_components: 5
    metric: "cosine"
    random_state: 42
  hdbscan_params:
    min_cluster_size: 8
    min_samples: 3
    cluster_selection_method: "leaf"
    cluster_selection_epsilon: 0.0
    prediction_data: true
  merge_threshold: 0.9

  umap_2d_params:
    n_neighbors: 30
    min_dist: 0.1
    n_components: 2
    metric: "cosine"
    random_state: 42
  plot_title: "LLM-Summarized Clusters (merged themes)"

  export_cols: ["number", "short_description", "description", "summary_final",
                "business_service", "u_service_feature", "u_incident_type", "cluster", "theme_group"]

  output_table: "redzone_consume.model_governance.ph05_output_ClusterThemes"
  overlay_table: "redzone_consume.model_governance.ph05_output_ThemeOverlay"
  volume_base_path: "/Volumes/redzone_consume/model_governance/Clustering"
  save_to_volume: true
