# ProblemHealth 01 Configuration
# Naming convention: <catalog>.<schema>.ph01_<input|output>_<DescriptiveName>
tables:
  input: "redzone_consume.model_governance.ph01_incidents_to_open_problems"
  output_incident: "redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity"
  output_problem: "redzone_consume.model_governance.ph01_output_ProblemHealth"

model:
  name: "all-MiniLM-L6-v2"
  registry_name: "redzone_consume.model_governance.all_MiniLM_L6_v2"
  backend: "onnx"          # "onnx" = ~2x faster on CPU, ~same quality. "torch" = original.
  batch_size: 256
  # Local Volume copy of the model — tried FIRST (no download, no registry call).
  # If empty on first run, the model is downloaded once and saved here for next time.
  volume_path: "/Volumes/redzone_consume/model_governance/ProblemHealth/model"

volume:
  base_path: "/Volumes/redzone_consume/model_governance/ProblemHealth"
  save_embeddings: true
  save_incident_scores: true
  save_problem_health: true

script:
  workspace_dir: "/Workspace/Users/nancyhuang@northwesternmutual.com/TCS/script"

# Text-cleaning engine:
#   "spark"  = distributed pandas_udf across all executor cores (Databricks). Best for the
#              first/full run (~100k rows). Falls back to pandas automatically on error.
#   "pandas" = single-thread on the driver. Fine for small incremental runs / local testing.
cleaning:
  engine: "spark"

incremental:
  key_column: "number"
  update_column: "sys_updated_on"
  # columns whose change should trigger a re-score (content hash)
  hash_columns:
    - "short_description"
    - "description"
    - "problem_id.short_description"
    - "problem_id.description"

# Test / dev controls
run:
  limit: null        # null = full dataset (production); set an int to test on first N rows


# ============================================================================
# Stage 02 — LLM summarization (02_llm_summarization/)
# Reads stage-01 output, normalizes incident & problem text with an LLM via
# ai_query, and upserts summaries. No-duplicate: only new/changed rows (by
# content hash) are sent to the LLM; unchanged rows reuse their stored summary.
# ============================================================================
summarization:
  model: "databricks-claude-opus-4-6"          # Databricks Foundation Model endpoint
  input_table: "redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity"

  output_incident: "redzone_consume.model_governance.ph02_output_IncidentSummaries"
  output_problem: "redzone_consume.model_governance.ph02_output_ProblemSummaries"

  volume_base_path: "/Volumes/redzone_consume/model_governance/LLMSummarization"
  save_to_volume: true

  fail_on_error: false      # ai_query failOnError; false -> errored rows fall back to original text
  drop_deleted: true        # remove summaries whose key no longer exists in the input

  # Offline quality metric (Top-K retrieval). OFF in production — sampled + chunked when on.
  eval:
    enabled: false
    sample_size: 5000
    top_k: 10
    embedding_model: "all-MiniLM-L6-v2"


# ============================================================================
# Stage 03 — Cross-encoder reranking (03_cross_encoder_rerank/)
# Re-scores ONLY the top-K bi-encoder shortlist per incident with a heavier
# cross-encoder (reads incident+problem jointly). Reads stage-02 summaries and
# stage-01 embeddings; writes reranked score matrices to a Volume.
#
# ALIGNMENT: the problem catalog (problem_*), the problem embeddings, and the
# similarity-matrix columns must all share the SAME problem row order — candidate
# index j must mean the same problem in every artifact. Confirm before the first run.
# ============================================================================
reranking:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_length: 512
  top_k: 50               # candidates reranked per incident
  chunk_size: 5000        # pairs per cross-encoder flush (bounded memory)
  batch_size: 128

  # --- inputs ---
  # incidents to rerank: incident_summary + gold problem_id
  # (PH02 incident summaries joined to the PH01 incident->problem links).
  input_sql: >
    SELECT CAST(i.number AS STRING)     AS number,
           s.incident_summary           AS incident_summary,
           CAST(i.problem_id AS STRING) AS problem_id
    FROM redzone_consume.model_governance.ph02_output_IncidentSummaries s
    JOIN redzone_consume.model_governance.ph01_output_IncidentScore_SemanticSimilarity i
      ON CAST(i.number AS STRING) = s.number
    WHERE i.problem_id IS NOT NULL
  input_table: null                                    # alt: a Delta table
  input_parquet: null                                  # alt: a Volume parquet
  incident_text_col: "incident_summary"

  # problem catalog (candidate pool): one row per problem with its summary
  problem_table: "redzone_consume.model_governance.ph02_output_ProblemSummaries"
  problem_parquet: null
  problem_text_col: "problem_summary"
  problem_id_col: "problem_id"

  # Candidate shortlist source. DEFAULT (all paths null): stage 03 encodes the
  # incidents + the problem catalog itself with `bi_encoder_model`, so the
  # shortlist is aligned with the catalog BY CONSTRUCTION.
  # Only set the *_path options below if you have artifacts that are genuinely
  # row-aligned with the problem catalog (stage 01's per-incident embedding files
  # are NOT — leave these null to use the safe default).
  similarity_matrix_path: null
  incident_embeddings_path: null
  problem_embeddings_path: null
  bi_encoder_model: "all-MiniLM-L6-v2"
  bi_encoder_batch_size: 64
  candidate_chunk_size: 1000

  # --- outputs ---
  volume_base_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank"
  save_to_volume: true     # -> reranked_scores.npy + reranked_scores_sigmoid.npy

  # Offline Top-K hit-rate against the existing incident->problem links.
  eval:
    enabled: true
    k_values: [5, 10]
    baselines:
      PH02: {1: 0.4034, 5: 0.7072, 7: 0.7593, 10: 0.8044}
      PH05: {1: 0.3885, 5: 0.6955, 7: 0.7456, 10: 0.8062}


# ============================================================================
# Stage 04 — Gradient Boosting inference (04_gradient_boost_inference/)
# Combines cosine similarity (stage 01), cross-encoder rerank score (stage 03),
# and a business-service match flag in a pre-trained GradientBoostingClassifier
# to produce a final propensity per (incident, candidate) pair, then writes the
# Top-N linked problems per incident to UC (Delta table + Volume parquet, no CSV).
#
# ALIGNMENT: the shortlist arrays below must be in the same row order as the
# incident frame, and top50_indices must index the problem catalog.
# ============================================================================
gbm_inference:
  model_path: "/Volumes/redzone_consume/model_governance/GradientBoostInference/PH04_gradient_boosting_model.pkl"

  top_k: 50                 # candidates per incident (matches the stage-03 shortlist)
  top_n: 10                 # linked problems written per incident
  batch_size: 500000        # rows per predict_proba batch
  limit: 5000               # TEST: first N incidents; set null for the full dataset

  # --- inputs (incident frame must be row-aligned with the arrays below) ---
  incident_sql: null
  incident_table: null
  incident_parquet: "/Volumes/redzone_consume/model_governance/GradientBoostInference/IncidentScore_SemanticSimilarity_Summarized.parquet"

  problem_table: null
  problem_parquet: "/Volumes/redzone_consume/model_governance/GradientBoostInference/prob_summary_LLM.parquet"

  number_col: "number"
  problem_id_col: "problem_id"
  incident_bs_col: "business_service"
  problem_bs_col: "problem_id.business_service"
  problem_desc_col: "combined_prob_desc"

  # upstream shortlist arrays (Volume; reranked_scores comes from stage 03)
  top50_indices_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank/top50_indices.npy"
  similarity_matrix_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank/similarity_matrix.npy"
  reranked_scores_path: "/Volumes/redzone_consume/model_governance/CrossEncoderRerank/reranked_scores.npy"

  # --- outputs (UC Delta table + Volume parquet; never CSV) ---
  output_table: "redzone_consume.model_governance.ph04_output_Incident_Problem_Linking_Top10"
  volume_base_path: "/Volumes/redzone_consume/model_governance/GradientBoostInference"
  save_to_volume: true

  eval:
    enabled: true
    k_values: [1, 5, 7, 10]
