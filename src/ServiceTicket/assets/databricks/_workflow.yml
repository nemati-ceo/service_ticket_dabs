# =============================================================================
# ServiceTicket workflow — runs the full 5-stage pipeline via run.py.
#
# Schedule: Monday & Thursday at 06:00 UTC.
# To change days, edit the day-of-week field of `quartz_cron_expression` below.
# Quartz requires exactly one of day-of-month / day-of-week to be `?`; day-of-week
# carries the days here, so day-of-month is `?`:
#   MON only    : 0 0 6 ? * MON
#   MON,THU     : 0 0 6 ? * MON,THU        (current)
#   MON,WED,FRI : 0 0 6 ? * MON,WED,FRI
#   Daily       : 0 0 6 ? * *
#
# To pause without deleting, set pause_status: PAUSED. To re-enable: UNPAUSED.
# =============================================================================
resources:
  jobs:
    service_ticket_pipeline:
      name: ${var.RESOURCE_PREFIX}.workflow

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON,THU"
        timezone_id: "UTC"
        pause_status: UNPAUSED  # change to PAUSED to disable without removing the schedule

      # Dedicated ephemeral job cluster (spec in var.CLUSTER_CONFIG_INFERENCE),
      # torn down after the run. Swap job_cluster_key for existing_cluster_id on
      # the task to run on a shared all-purpose cluster instead.
      job_clusters:
        - job_cluster_key: ${var.ARTIFACT_ID}_workflow_cluster
          new_cluster: ${var.CLUSTER_CONFIG_INFERENCE}

      run_as:
        service_principal_name: ${var.SERVICE_PRINCIPAL_ID}

      tasks:
        - task_key: run_pipeline
          description: "Run full 5-stage pipeline (stages 01-05) via run.py"
          job_cluster_key: ${var.ARTIFACT_ID}_workflow_cluster
          spark_python_task:
            # DAB syncs repo files under ${workspace.file_path}. run.py's
            # `if __name__ == "__main__": main()` runs stages 01..05.
            python_file: ${workspace.file_path}/src/ServiceTicket/run.py
          # Pipeline deps. pyspark is provided by the Databricks runtime, so it is
          # intentionally omitted here.
          libraries:
            - pypi: {package: "numpy>=1.26"}
            - pypi: {package: "pandas>=2.0"}
            - pypi: {package: "scipy>=1.11"}
            - pypi: {package: "PyYAML>=6.0"}
            - pypi: {package: "sentence-transformers>=2.7"}
            - pypi: {package: "nltk>=3.8"}
            - pypi: {package: "tqdm>=4.65"}
            # stage 01b PII redaction. The en_core_web_lg model is loaded from a
            # Volume, not installed — only these libraries come from pip.
            - pypi: {package: "presidio-analyzer>=2.2,<2.3"}
            - pypi: {package: "presidio-anonymizer>=2.2,<2.3"}
            - pypi: {package: "spacy>=3.8,<3.9"}
            - pypi: {package: "scikit-learn==1.4.2"}
            - pypi: {package: "joblib>=1.3"}
            - pypi: {package: "umap-learn>=0.5"}
            - pypi: {package: "hdbscan>=0.8.33"}
            - pypi: {package: "plotly>=5.18"}
            - pypi: {package: "kaleido>=0.2.1"}
            - pypi: {package: "optimum[onnxruntime]>=1.17"}
            - pypi: {package: "onnxruntime>=1.17"}
            - pypi: {package: "mlflow>=2.11"}
      # queue: { enabled: true }
      # tags / email_notifications — add per your template.
