# =============================================================================
# Compute for ServiceTicket.
#
# The workflow runs on an ephemeral job cluster whose spec lives in ONE place:
# the CLUSTER_CONFIG_INFERENCE variable (_variables.yml), referenced by
# _workflow.yml as `new_cluster: ${var.CLUSTER_CONFIG_INFERENCE}`.
#
# Nothing is defined here on purpose — keeping the cluster spec in a single
# source of truth avoids the two-places drift. To change the cluster (runtime,
# node type, autoscale), edit CLUSTER_CONFIG_INFERENCE in _variables.yml.
# =============================================================================
