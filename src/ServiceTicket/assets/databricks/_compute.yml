# -----------------------------------------------------------------------------
# To learn more about cluster configuration, see:
# https://docs.databricks.com/api/workspace/clusters/create
# -----------------------------------------------------------------------------
variables:
  # ---------------------------------------------------------------------------
  # Cluster configuration variables
  # ---------------------------------------------------------------------------
  CLUSTER_CONFIG_INFERENCE:
    description: Define the cluster configuration to use for the inference job.
    type: complex
    default:
      # GPU runtime (Nancy, 2026-07-22). The pipeline runs on GPU only now — the
      # 18.0.x-gpu-ml runtime ships numpy 2.1.3, which the pinned libraries in
      # _workflow.yml / requirements.txt must match (see the numpy-2 note there).
      node_type_id: g5.xlarge
      driver_node_type_id: g5.xlarge
      spark_version: 18.0.x-gpu-ml-scala2.13
      spark_env_vars: ${var.CLUSTER_ENV_VARS}
      spark_conf:
        spark.sql.execution.arrow.pyspark.enabled: 'true'
      custom_tags:
        artifact_id: ${var.ARTIFACT_ID}
        group_id: ${var.GROUP_ID}
      autoscale:
        min_workers: 1
        max_workers: 10
      aws_attributes:
        first_on_demand: 1
  CLUSTER_CONFIG_TRAINING:
    description: Define the cluster configuration to use for the training job.
    type: complex
    default:
      # GPU runtime (Nancy, 2026-07-22) — same stack as inference so the numpy
      # 2.1.3 / scikit-learn>=1.5 pins hold when the stage-04 GBM is retrained.
      node_type_id: g5.xlarge
      driver_node_type_id: g5.xlarge
      spark_version: 18.0.x-gpu-ml-scala2.13
      spark_env_vars: ${var.CLUSTER_ENV_VARS}
      spark_conf:
        spark.sql.execution.arrow.pyspark.enabled: 'true'
      custom_tags:
        artifact_id: ${var.ARTIFACT_ID}
        group_id: ${var.GROUP_ID}
      autoscale:
        min_workers: 1
        max_workers: 10
      aws_attributes:
        first_on_demand: 1
  # ---------------------------------------------------------------------------
  # Util Variables
  # ---------------------------------------------------------------------------
  CLUSTER_ENV_VARS:
    description: Set of environment variables to have available in a cluster.
    type: complex
    default:
      ARTIFACT_ID: ${var.ARTIFACT_ID}
      ARTIFACTORY_API_KEY: "{{secrets/artifactory/api_key}}"
      ARTIFACTORY_USER: "{{secrets/artifactory/user}}"
      ENVIRONMENT: ${var.ENVIRONMENT}
      GROUP_ID: ${var.GROUP_ID}
      NMLOPS_LOG_LEVEL: INFO
      ROOT_PATH: ${var.ROOT_PATH}
  # CLUSTER_LIBRARIES lives in _variables.yml (single source), not here.
