# mode: production = load GBM + score (writes linking table); train = fit new GBM (no linking write).
mode: "production"

tables:
  # Pipeline reads CONSUME mirror (full copy from Stage 00), not refine.
  input: "redzone_consume.tcs_servicenow_analytics.incidentstoopenproblem_synced"
  output_incident: "redzone_consume.tcs_servicenow_analytics.ph01_output_IncidentScore_SemanticSimilarity"
  output_problem: "redzone_consume.tcs_servicenow_analytics.ph01_output_ProblemHealth"

# Stage 00 — input sync. Full copy refine -> consume mirror (overwrite); refine READ-ONLY. Only incidentstoopenproblem read today.
input_sync:
  enabled: true
  tables:
    - source: "redzone_refine.servicenow_incidents_problems.incidentstoopenproblem"
      target: "redzone_consume.tcs_servicenow_analytics.incidentstoopenproblem_synced"
    - source: "redzone_refine.servicenow_incidents_problems.problemzeroincidents"
      target: "redzone_consume.tcs_servicenow_analytics.problemzeroincidents_synced"
    - source: "redzone_refine.servicenow_incidents_problems.cluster"
      target: "redzone_consume.tcs_servicenow_analytics.cluster_synced"

# Secret scope for external API tokens. WARNING: "tcs-snow-test-cred" is TEST scope — swap for prod on deploy.
secrets:
  scope: "tcs-snow-test-cred"
  hf_token_key: "hf-token"
  snow_api_key: "snow-api-key"
  # HF hub proxy via NM Artifactory (huggingface.co firewalled in redzone). Blank = public hub (local dev).
  hf_endpoint: "https://artifactory.nml.com/artifactory/api/huggingfaceml/huggingface-remote"

# Stage-01 source: "table" (reads tables.input) or "servicenow" (live REST, servicenow_source.py).
source:
  type: "table"

# ServiceNow REST gateway — only when source.type == "servicenow". Auth via `apikey` header.
servicenow:
  base_url: "https://api.nmlv.nml.com/servicenow-gateway-api"
  timeout: 30
  incident_numbers:
    - "INC3233656"

model:
  name: "all-MiniLM-L6-v2"
  registry_name: "redzone_consume.tcs_servicenow_analytics.all_MiniLM_L6_v2"
  backend: "onnx"
  batch_size: 256
  volume_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/ProblemHealth/model"

# Stage 01 writes all output to live Delta tables (tables.output_*); no parquet dumps.

cleaning:
  engine: "spark"

script:
  workspace_dir: "/Workspace/Users/nancyhuang@northwesternmutual.com/TCS/script"

keys:
  key_column: "number"
  problem_key: "problem_id"


# Stage 01b — PII redaction. In-place spans -> <ENTITY>, irreversible. spaCy model loaded FROM VOLUME (redzone firewalls downloads).
pii_redaction:
  enabled: true
  model_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/PIIRedaction/en_core_web_lg"
  spacy_model: "en_core_web_lg"

  # EVERY table whose text reaches the LLM must be listed — ai_query() is the only egress; unredacted = PII leak.
  tables:
    # Linked incidents (+ problem text) — stage-01 output. Feeds stages 02-04.
    - input_table: "redzone_consume.tcs_servicenow_analytics.ph01_output_IncidentScore_SemanticSimilarity"
      output_table: "redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted"
      text_columns:
        - "combined_cleaned_desc"
        - "combined_prob_desc"
        - "short_description"
        - "description"

    # Unlinked incidents (`cluster` table) — stage 05 clusters + gap-fills these. close_notes is free text.
    - input_table: "redzone_consume.tcs_servicenow_analytics.cluster_synced"
      output_table: "redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted_Unlinked"
      text_columns:
        - "short_description"
        - "description"
        - "close_notes"

    # Zero-incident problems — summarized by stage 02, become GBM candidates. short_description only.
    - input_table: "redzone_consume.tcs_servicenow_analytics.problemzeroincidents_synced"
      output_table: "redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted_ProblemsZero"
      text_columns:
        - "short_description"

  entities:
    - "PERSON"           # spaCy NER
    - "EMAIL_ADDRESS"    # built-in regex
    - "PHONE_NUMBER"     # built-in (phonenumbers lib)
    - "LOCATION"         # spaCy NER — cities/states/countries, NOT street addresses
    - "USER_ID"          # custom, below
    - "STREET_ADDRESS"   # custom, below

  # Regex PatternRecognizers for entities Presidio lacks built-ins for.
  custom_recognizers:
    # USER_ID: 3 letters + 4 digits (xyz1234).
    USER_ID: "\\b[A-Za-z]{3}\\d{4}\\b"
    # STREET_ADDRESS: spaCy LOCATION misses street lines ("720 E Wisconsin Ave").
    STREET_ADDRESS: "\\b\\d{1,6}\\s+(?:[NSEW]\\.?\\s+)?(?:[A-Za-z0-9.'-]+\\s+){0,4}(?:Street|St|Avenue|Ave|Road|Rd|Boulevard|Blvd|Drive|Dr|Lane|Ln|Court|Ct|Place|Pl|Terrace|Ter|Circle|Cir|Way|Parkway|Pkwy|Highway|Hwy|Suite|Ste|Apt|Unit)\\b\\.?"

  language: "en"

  # MUST stay below 0.4: Presidio scores PHONE_NUMBER at exactly 0.4, so 0.5 silently leaks every phone number.
  score_threshold: 0.35

  batch_size: 64

run:
  limit: null   # null = FULL run (no row cap). Integer only for quick test runs.


# MLflow — one parent run, each stage a nested child run (status/params/metrics/artifacts). Best-effort, never breaks a run.
mlflow:
  enabled: true
  experiment: "/Shared/ProblemHealth"   # shared folder the run-as SP can write; a personal /Users/... folder gives PERMISSION_DENIED.
  tracking_uri:          # blank = ambient (Databricks notebook)
  log_system_metrics: true   # CPU/GPU/memory (needs psutil; pynvml for GPU)


summarization:
  model: "databricks-claude-opus-4-6"
  # REDACTED table only — stage 02 sends text off-cluster. Never a raw table.
  input_table: "redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted"

  # Problem catalog = UNION of linked + zero-incident problems (else zero-incident never summarized/linked). UNION ALL safe.
  problem_source_sql: >
    SELECT CAST(problem_id AS STRING)  AS problem_id,
           combined_prob_desc          AS combined_prob_desc
    FROM redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted
    WHERE problem_id IS NOT NULL
    UNION ALL
    SELECT CAST(number AS STRING)      AS problem_id,
           short_description           AS combined_prob_desc
    FROM redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted_ProblemsZero
    WHERE number IS NOT NULL

  # Stage 02 writes summaries only to these live Delta tables (no parquet dumps).
  output_incident: "redzone_consume.tcs_servicenow_analytics.ph02_output_IncidentSummaries"
  output_problem: "redzone_consume.tcs_servicenow_analytics.ph02_output_ProblemSummaries"

  fail_on_error: false
  drop_deleted: true

  eval:
    enabled: false
    sample_size: 5000
    top_k: 10
    embedding_model: "all-MiniLM-L6-v2"


reranking:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_length: 512
  top_k: 50
  chunk_size: 5000
  batch_size: 128
  limit: null   # null = FULL run (no incident cap). Integer only for quick test runs.

  input_sql: >
    SELECT CAST(i.number AS STRING)     AS number,
           s.incident_summary           AS incident_summary,
           CAST(i.problem_id AS STRING) AS problem_id
    FROM redzone_consume.tcs_servicenow_analytics.ph02_output_IncidentSummaries s
    JOIN redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted i
      ON CAST(i.number AS STRING) = s.number
    WHERE i.problem_id IS NOT NULL
  input_table: null
  input_parquet: null
  incident_text_col: "incident_summary"

  problem_table: "redzone_consume.tcs_servicenow_analytics.ph02_output_ProblemSummaries"
  problem_parquet: null
  problem_text_col: "problem_summary"
  problem_id_col: "problem_id"

  similarity_matrix_path: null
  incident_embeddings_path: null
  problem_embeddings_path: null
  model_volume_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/CrossEncoderRerank/cross_encoder_model"
  bi_encoder_volume_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/CrossEncoderRerank/bi_encoder_model"
  bi_encoder_model: "all-MiniLM-L6-v2"
  bi_encoder_batch_size: 64
  candidate_chunk_size: 1000

  number_col: "number"
  output_table: "redzone_consume.tcs_servicenow_analytics.ph03_output_RerankedScores"
  volume_base_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/CrossEncoderRerank"
  save_to_volume: true

  eval:
    enabled: true
    k_values: [5, 10]
    baselines:
      PH02: {1: 0.4034, 5: 0.7072, 7: 0.7593, 10: 0.8044}
      PH05: {1: 0.3885, 5: 0.6955, 7: 0.7456, 10: 0.8062}


gbm_inference:
  model_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/GradientBoostInference/PH04_gradient_boosting_model.pkl"

  top_n: 10
  batch_size: 500000

  # stage-03 reranked scores: number, candidate_problem_id, cosine_sim, rerank_score
  reranked_sql: null
  reranked_table: "redzone_consume.tcs_servicenow_analytics.ph03_output_RerankedScores"
  reranked_parquet: null
  candidate_id_col: "candidate_problem_id"
  cosine_col: "cosine_sim"
  reranker_col: "rerank_score"

  # incidents: number + gold problem_id + business_service. MUST be redacted table (linking.py copies every column into output).
  incident_sql: null
  incident_table: "redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted"
  incident_parquet: null

  # Problem catalog: problem_id + problem_summary + business_service. MUST be a JOIN — ph02 has NO business_service, so a bare table silently zeroes bs_match.
  problem_sql: >
    SELECT s.problem_id                      AS problem_id,
           s.problem_summary                 AS problem_summary,
           any_value(b.business_service)     AS business_service
    FROM redzone_consume.tcs_servicenow_analytics.ph02_output_ProblemSummaries s
    LEFT JOIN (
        SELECT CAST(problem_id AS STRING)          AS problem_id,
               `problem_id.business_service`       AS business_service
        FROM redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted
        UNION ALL
        SELECT CAST(number AS STRING)              AS problem_id,
               business_service                    AS business_service
        FROM redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted_ProblemsZero
    ) b ON CAST(s.problem_id AS STRING) = b.problem_id
    GROUP BY s.problem_id, s.problem_summary
  problem_table: "redzone_consume.tcs_servicenow_analytics.ph02_output_ProblemSummaries"
  problem_parquet: null

  number_col: "number"
  problem_id_col: "problem_id"
  incident_bs_col: "business_service"
  problem_bs_col: "business_service"
  problem_desc_col: "problem_summary"

  output_table: "redzone_consume.tcs_servicenow_analytics.ph04_output_Incident_Problem_Linking_Top10"
  volume_base_path: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/GradientBoostInference"
  save_to_volume: true

  eval:
    enabled: true
    k_values: [1, 5, 7, 10]


# Stage 04 TRAIN branch (mode: train). Fits new GBM, writes .pkl to Volume, no linking-table write. Holdout split BY INCIDENT (group_col) to avoid leakage.
gbm_train:
  model_dir: "/Volumes/redzone_consume/tcs_servicenow_analytics/inference_engines/GradientBoostInference"
  model_name: "PH04_gradient_boosting_model.pkl"

  # TRAIN ONLY: drop incidents with cosine-to-gold below this (weak link = bad label). NEVER in production (leaks answer). null = no filter.
  min_semantic_similarity: 0.35
  similarity_col: "semantic_similarity"

  group_col: "number"
  test_size: 0.2
  random_state: 42
  params:
    n_estimators: 200
    max_depth: 3
    learning_rate: 0.1
  eval:
    k_values: [1, 5, 7, 10]


clustering:
  embed_model: "all-MiniLM-L6-v2"
  embed_batch_size: 64

  # Stage 05 clusters UNLINKED incidents (`cluster` table). Gap-fill reuses summarizer on REDACTED unlinked table (ai_query egress).
  summarize_gap: true
  summarize_text_col: "combined_cleaned_desc"
  summarize_source_sql: >
    SELECT CAST(number AS STRING)                                  AS number,
           CONCAT(COALESCE(short_description, ''), ' ',
                  COALESCE(description, ''))                       AS combined_cleaned_desc
    FROM redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted_Unlinked

  # Clustering input: stage-02 summaries joined to incident attributes. Required: number + summary_final; rest are overlay/hover.
  input_sql: >
    SELECT CAST(i.number AS STRING)            AS number,
           s.incident_summary                  AS summary_final,
           i.short_description                 AS short_description,
           i.description                       AS description,
           i.business_service                  AS business_service,
           i.u_service_feature                 AS u_service_feature
    FROM redzone_consume.tcs_servicenow_analytics.ph02_output_IncidentSummaries s
    JOIN redzone_consume.tcs_servicenow_analytics.ph01b_output_Redacted_Unlinked i
      ON CAST(i.number AS STRING) = CAST(s.number AS STRING)
  input_table: null
  input_parquet: null
  number_col: "number"
  text_col: "summary_final"
  cat_cols: ["business_service", "u_service_feature"]

  # Skip clustering below this many tickets (too few; UMAP needs n_neighbors < n_rows). All marked noise.
  min_cluster_rows: 15

  umap_params:
    n_neighbors: 15
    n_components: 5
    metric: "cosine"
    random_state: 42
  hdbscan_params:
    min_cluster_size: 8
    min_samples: 3
    cluster_selection_method: "leaf"
    cluster_selection_epsilon: 0.0
    prediction_data: true
  merge_threshold: 0.9

  # silhouette_score is O(N^2); subsample this many non-noise points. null = exact (small N only).
  silhouette_sample_size: 5000

  umap_2d_params:
    n_neighbors: 30
    min_dist: 0.1
    n_components: 2
    metric: "cosine"
    random_state: 42
  plot_title: "LLM-Summarized Clusters (merged themes)"

  export_cols: ["number", "short_description", "description", "summary_final",
                "business_service", "u_service_feature", "cluster", "theme_group"]

  output_table: "redzone_consume.tcs_servicenow_analytics.ph05_output_ClusterThemes"
  overlay_table: "redzone_consume.tcs_servicenow_analytics.ph05_output_ThemeOverlay"
  # Plot + metrics + params logged to MLflow (no Volume writes).
